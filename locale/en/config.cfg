[mod-setting-name]
doodle-undo-stack-cap=Undo history size
doodle-min-line-width=Minimum line width
doodle-max-line-width=Maximum line width
doodle-line-width-step=Line width step
doodle-line-color=Default line color

[mod-setting-description]
doodle-undo-stack-cap=Maximum undo and redo steps kept per player.
doodle-min-line-width=Smallest width on the line tool slider. Requires restart.
doodle-max-line-width=Largest width on the line tool slider. Requires restart.
doodle-line-width-step=Step between width slider values. Requires restart.
doodle-line-color=Color used for new lines. Player uses your character color.

